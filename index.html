<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MeadTrics</title>
  <style>
/* ===============================
   MeadTrics Stylesheet
   =============================== */

/* === Theme Variables: Honey Mead Cellar === */
:root {
  --bg: #120c06;
  --panel: #24170b;
  --panel-2: #2f1f10;
  --muted: #d9b977;
  --text: #fff6db;
  --text-strong: #fff0b8;
  --accent: #f4b83f;
  --accent-2: #ffd86b;
  --accent-3: #8f5a16;
  --honey-glow: rgba(244, 184, 63, 0.35);
  --danger: #ff7a5c;
  --border: #5b3a17;
  --shadow: 0 12px 34px rgba(20, 10, 0, 0.55), 0 0 24px rgba(244, 184, 63, 0.08);
  --radius: 16px;
}

/* === Global Reset === */
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
    Helvetica, Arial, Noto Sans, "Apple Color Emoji", "Segoe UI Emoji";
  background:
    radial-gradient(900px 620px at 100% -10%, rgba(255, 190, 58, 0.22) 0, transparent 55%),
    radial-gradient(800px 520px at 0% 110%, rgba(132, 72, 16, 0.34) 0, transparent 55%),
    linear-gradient(135deg, #120c06 0%, #1b1007 48%, #0d0804 100%);
  color: var(--text);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  opacity: 0.16;
  background-image:
    linear-gradient(30deg, rgba(255, 213, 111, 0.35) 12%, transparent 12.5%, transparent 87%, rgba(255, 213, 111, 0.35) 87.5%, rgba(255, 213, 111, 0.35)),
    linear-gradient(150deg, rgba(255, 213, 111, 0.35) 12%, transparent 12.5%, transparent 87%, rgba(255, 213, 111, 0.35) 87.5%, rgba(255, 213, 111, 0.35)),
    linear-gradient(30deg, rgba(255, 213, 111, 0.35) 12%, transparent 12.5%, transparent 87%, rgba(255, 213, 111, 0.35) 87.5%, rgba(255, 213, 111, 0.35)),
    linear-gradient(150deg, rgba(255, 213, 111, 0.35) 12%, transparent 12.5%, transparent 87%, rgba(255, 213, 111, 0.35) 87.5%, rgba(255, 213, 111, 0.35)),
    linear-gradient(60deg, rgba(255, 213, 111, 0.18) 25%, transparent 25.5%, transparent 75%, rgba(255, 213, 111, 0.18) 75%, rgba(255, 213, 111, 0.18));
  background-size: 48px 84px;
  background-position: 0 0, 0 0, 24px 42px, 24px 42px, 0 0;
}

/* === Input Styles === */
input[type="number"] { font-size: 16px; }
input[type="number"].wide { width: 100%; min-width: 150px; }

/* === Honey Themed Inputs === */
input[type="text"],
input[type="date"],
input[type="number"],
textarea,
select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 12px;

  /* 🍯 Warm honey background */
  background: linear-gradient(
    180deg,
    rgba(255, 204, 102, 0.08),
    rgba(255, 153, 0, 0.05)
  );

  /* 🍯 Golden border */
  border: 1px solid rgba(255, 183, 77, 0.35);

  color: #fff3d6;

  box-shadow:
    inset 0 1px 2px rgba(0,0,0,0.4),
    0 0 0 1px rgba(255, 183, 77, 0.05);

  transition: all 0.15s ease;
}

/* ✨ Hover */
input:hover,
textarea:hover,
select:hover {
  border-color: rgba(255, 183, 77, 0.6);
  background: rgba(255, 183, 77, 0.08);
}

/* 🍯 Focus glow */
input:focus,
textarea:focus,
select:focus {
  outline: none;
  border-color: #ffb74d;

  box-shadow:
    0 0 0 2px rgba(255, 183, 77, 0.25),
    0 0 12px rgba(255, 183, 77, 0.15);
}

/* 🐝 Placeholder text */
input::placeholder,
textarea::placeholder {
  color: rgba(255, 213, 128, 0.6);
}

/* 🧈 Disabled */
input:disabled,
textarea:disabled {
  opacity: 0.5;
  background: rgba(255, 255, 255, 0.05);
}
textarea { resize: vertical; min-height: 80px; }

/* === Layout === */
.app {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 16px;
  height: 100%;
  padding: 16px;
}
.sidebar {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.sidebar header h1 { font-size: 18px; margin: 0; }

.search { width: 100%; }
.search input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #0f141b;
  color: var(--text);
}

.content {
  display: grid;
  grid-template-rows: 1fr auto;
  gap: 16px;
}
.detail {
  padding: 16px;
  overflow: auto;
}
.detail h2 { margin: 0 0 8px 0; }

/* === Cards & Panels === */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

/* === Lists === */
.list {
  overflow: auto;
  padding: 8px;
  display: grid;
  gap: 8px;
}
.batch {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.batch:hover { border-color: #3a4150; background: #111821; }
.batch.active { outline: 2px solid var(--accent); background: #101722; }
.batch .name { font-weight: 600; }
.batch .name:hover { text-decoration: underline; cursor: pointer; }
.batch .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
.batch .btn-danger {
  padding: 2px 6px;
  font-size: 12px;
  line-height: 1;
  border-radius: 8px;
}
.batch .btn-danger:hover {
  background: #2a1616;
  color: #ffb5b5;
}

/* === Form Layout === */
.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
}
.grid .col-6 { grid-column: span 6; }
.grid .col-12 { grid-column: span 12; }

label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}

/* === Fieldsets === */
.fieldset {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
}
.fieldset legend {
  font-weight: 600;
  color: var(--accent);
  cursor: default;
}
.fieldset legend:hover { color: var(--accent-2); }
.fieldset + .fieldset {
  margin-top: 14px;
  border-color: #252b34;
  background: rgba(255, 255, 255, 0.02);
  padding-top: 10px;
  padding-bottom: 10px;
}
.fieldset:nth-of-type(n+2) {
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
  border-radius: 10px;
}
.fieldset.collapsible legend::after { content: " ▼"; }
.fieldset.collapsible.collapsed legend::after { content: " ▶"; }

/* === Buttons === */
button {
  appearance: none;
  border: 1px solid var(--border);
  background: #121923;
  color: var(--text);
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: transform .04s ease, background .2s, border-color .2s;
  font-weight: 600;
}
button:hover { background: #182233; border-color: #304055; }
button:active { transform: translateY(1px); }

.btn-accent {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s ease;
}
.btn-accent:hover { background: var(--accent-2); }

.btn-danger {
  background: #2a1416;
  border-color: #4e2326;
  color: #ffd6d6;
}

/* === Footer === */
.footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: space-between;
}
.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 9999px;
  border: 1px solid var(--border);
  color: var(--muted);
}

/* === Tables === */
.table {
  width: 100%;
  border-collapse: collapse;
}
.table th, .table td {
  border-bottom: 1px solid var(--border);
  padding: 8px 6px;
  text-align: left;
  font-size: 14px;
}
.table tr[data-type="bottled"] td { background: rgba(255,255,255,0.02); color: #b5e08a; }
.table tr[data-type="feeding"] td { background: rgba(255,200,0,0.04); color: #ffe680; }
.table tr[data-type="racked"] td { color: #b0c0ff; }
.table tr[data-type="note"] td textarea { background: #111822; color: #d8dee9; }
.empty { color: var(--muted); font-style: italic; padding: 12px 0; }

/* === Chart === */
canvas {
  width: 100%;
  height: 220px;
  background: #0c1218;
  border: 1px solid var(--border);
  border-radius: 12px;
}
.chart-tooltip {
  position: absolute;
  pointer-events: none;
  background: #0f141b;
  color: #e8edf5;
  border: 1px solid #2a2f39;
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 10;
}

/* === Utility === */
.row { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.meta { white-space: pre-line; }
.meta::first-line { font-weight: 500; }
.meta:has(> span) { display: flex; flex-direction: column; }
.hidden { display: none !important; }

/* === Scrollbars === */
.list::-webkit-scrollbar,
.detail::-webkit-scrollbar { width: 8px; }
.list::-webkit-scrollbar-thumb,
.detail::-webkit-scrollbar-thumb {
  background: #202833;
  border-radius: 6px;
}
.list::-webkit-scrollbar-thumb:hover,
.detail::-webkit-scrollbar-thumb:hover { background: #2e3a4b; }

/* === Feedback Button === */
.icon-btn {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 50%;
  width: 46px;
  height: 46px;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  z-index: 1000;
}

/* === Popup / Feedback Modal === */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10000;
}
.popup.hidden { display: none; }

.popup-content {
  background: var(--panel);
  color: var(--text);
  padding: 20px;
  border-radius: var(--radius);
  width: 90%;
  max-width: 420px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  animation: fadeIn 0.25s ease;
}
.popup-content h3 { margin-top: 0; color: var(--accent); }
.popup-content textarea {
  width: 100%;
  box-sizing: border-box;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #0f141b;
  color: var(--text);
  resize: vertical;
  font-family: inherit;
}
.popup-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 12px;
}
.popup-actions button {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.popup-actions .primary {
  background: var(--accent);
  color: #fff;
}
.popup-actions .primary:hover { background: var(--accent-2); }
.popup-actions .secondary {
  background: #1a2028;
  color: var(--text);
}
.popup-actions .secondary:hover { background: #222a33; }

/* === Print Labels === */
@media print {
  body * { visibility: hidden; }
  #labelBox, #labelBox * { visibility: visible; }
  #labelBox {
    position: absolute;
    left: 0;
    top: 0;
    margin: 0;
  }
}

/* === Responsive === */
@media (max-width: 980px) {
  .app { grid-template-columns: 1fr; }
  .content { grid-template-rows: auto auto; }
}

/* === Label Maker Modal === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.modal-content {
  background: var(--panel);
  color: var(--text);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 20px;
  max-width: 420px;
  width: 90%;
}

/* Keep label preview positioned so QR can anchor to a corner */
.label-preview {
  position: relative;
  padding: 8mm;
  border-radius: 8px;
  background: var(--panel, #1b2330);
  box-shadow: 0 8px 24px rgba(0,0,0,.35);
  text-align: center;
}

/* Centered QR container */
#qrContainer {
  width: 28mm;       /* consistent print scaling */
  height: 28mm;
  margin: 6mm auto 0 auto;
  display: grid;
  place-items: center;
  background: transparent;
}

/* QR image/canvas crisp rendering */
#qrContainer canvas,
#qrContainer img {
  width: 100% !important;
  height: 100% !important;
  display: block;
}

/* Optional subtle frame */
#qrContainer.qr-framed {
  padding: 2mm;
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  outline: 1px solid rgba(255,255,255,0.1);
}

/* Print layout */
@media print {
  body * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  #labelModal.modal-overlay {
    background: transparent !important;
  }

  #labelModal .modal-content {
    box-shadow: none !important;
    border: none !important;
  }

  /* Hide buttons on print */
  #labelModal .row {
    display: none !important;
  }

  .label-preview {
    margin: 0 auto !important;
    box-shadow: none !important;
    width: 90mm;          /* adjust for sticker width */
    min-height: 120mm;    /* adjust for sticker height */
  }

  #qrContainer {
    margin-top: 6mm !important;
  }
}

/* Responsive */
@media (max-width: 520px) {
  #qrContainer {
    width: 24mm;
    height: 24mm;
    margin-top: 4mm;
  }
}

/* === Enhanced Responsive Scaling === */
html {
  font-size: clamp(12px, 1vw + 0.5rem, 18px);
}

/* Sidebar and main content stack on smaller screens */
@media (max-width: 1200px) {
  .app {
    grid-template-columns: 260px 1fr;
    gap: 12px;
  }
}

/* Tablet layout: full-width stacked sections */
@media (max-width: 800px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
  }

  .sidebar {
    order: 2;
    max-height: 40vh;
    overflow-y: auto;
  }

  .content {
    order: 1;
  }

  .detail {
    max-height: 55vh;
    overflow-y: auto;
  }

  canvas {
    height: 180px !important;
  }
}

/* Mobile layout: single-column with tighter spacing */
@media (max-width: 600px) {
  body {
    padding: 0;
  }

  .app {
    padding: 8px;
    gap: 8px;
  }

  .fieldset {
    padding: 8px;
  }

  .card {
    border-radius: 10px;
  }

  button {
    font-size: 0.9rem;
    padding: 8px 10px;
  }

  legend {
    font-size: 1rem;
  }

  h1, h2 {
    font-size: 1.1rem;
  }

  .sidebar header {
    flex-direction: column;
    align-items: flex-start;
  }

  .icon-btn {
    bottom: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    font-size: 18px;
  }
}

/* Ultra-wide: center constrain layout */
@media (min-width: 2000px) {
  .app {
    max-width: 1600px;
    margin: 0 auto;
  }
}

.tag {
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.tag:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* === Sidebar Drawer System === */
#sidebarToggle {
  display: none;
  position: fixed;
  top: 1rem;
  left: 1rem;
  z-index: 1001;
  background: var(--accent, #4a9fff);
  color: white;
  font-size: 1.4rem;
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
  cursor: pointer;
}

/* Drawer hidden by default */
#sidebarDrawer {
  position: fixed;
  top: 0;
  left: -260px; /* hidden off-screen */
  width: 240px;
  height: 100%;
  background: var(--panel, #1b1f27);
  box-shadow: 4px 0 12px rgba(0,0,0,0.4);
  padding: 1rem;
  transition: left 0.3s ease;
  z-index: 1000;
  overflow-y: auto;
  color: var(--text, #fff);
}

#sidebarDrawer.open {
  left: 0; /* slide in */
}

/* Overlay */
#sidebarOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.45);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease;
  z-index: 999;
}

#sidebarOverlay.visible {
  opacity: 1;
  visibility: visible;
}

/* Mobile only */
@media (max-width: 768px) {
  #sidebarToggle {
    display: block;
  }

  /* Hide desktop sidebar on mobile */
  .sidebar {
    display: none !important;
  }
}

/* Desktop keeps normal layout */
@media (min-width: 769px) {
  #sidebarDrawer,
  #sidebarOverlay,
  #sidebarToggle {
    display: none;
  }
}

#finingCard table {
  border-collapse: collapse;
  width: 100%;
}
#finingCard th, #finingCard td {
  border-bottom: 1px solid var(--border);
  padding: 4px 6px;
  text-align: left;
}
#finingCard th {
  color: var(--text-strong);
}
#finingCard td {
  color: var(--muted);
}

/* 🔔 Update Toast */
#updateToast {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  max-width: 320px;
  background: #1f1f1f;
  color: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,.4);
  z-index: 9999;
}

#updateToast .toast-content {
  padding: 1rem;
  font-size: 0.9rem;
}

#updateToast .diff {
  margin: 0.5rem 0;
  opacity: 0.85;
  font-family: monospace;
}

#updateToast .actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.5rem;
}

#updateToast button {
  border: none;
  border-radius: 8px;
  padding: 0.4rem 0.7rem;
  cursor: pointer;
}

#updateToast #updateNow {
  background: #e0a400;
  color: #000;
}


/* === Honey Theme Polish Overrides === */
.card,
.fieldset,
.modal-content,
.popup-content {
  background:
    linear-gradient(180deg, rgba(255, 216, 107, 0.055), rgba(255, 216, 107, 0.015)),
    var(--panel);
  border-color: rgba(173, 111, 28, 0.72);
}

.sidebar header {
  background: linear-gradient(135deg, rgba(244,184,63,0.16), rgba(143,90,22,0.08));
}

.sidebar header h1::before {
  content: "🍯 ";
}

input[type="text"],
input[type="date"],
input[type="number"],
textarea,
select,
.search input {
  background: #1a1007;
  border-color: #6d4318;
  color: var(--text);
  box-shadow: inset 0 1px 0 rgba(255, 216, 107, 0.05);
}

input:focus,
textarea:focus,
select:focus {
  outline: 2px solid rgba(244,184,63,0.35);
  border-color: var(--accent);
}

button {
  background: linear-gradient(180deg, #3b260f, #241509);
  border-color: #7a4c18;
  color: #fff2c4;
}
button:hover {
  background: linear-gradient(180deg, #4d3315, #2e1d0c);
  border-color: var(--accent);
}

.btn-accent,
.icon-btn,
#sidebarToggle {
  background: linear-gradient(180deg, #ffd86b 0%, #f4b83f 48%, #b86f16 100%);
  color: #241307;
  border: 1px solid #ffd86b;
  box-shadow: 0 4px 14px rgba(244, 184, 63, 0.28);
}
.btn-accent:hover,
.icon-btn:hover,
#sidebarToggle:hover {
  background: linear-gradient(180deg, #ffe694 0%, #ffc94d 48%, #cf821d 100%);
  color: #1a0d04;
}

.btn-danger {
  background: #38140d;
  border-color: #8a3924;
  color: #ffd7c7;
}

.batch {
  background: rgba(255, 216, 107, 0.025);
}
.batch:hover {
  border-color: var(--accent);
  background: rgba(244, 184, 63, 0.08);
}
.batch.active {
  outline: 2px solid var(--accent);
  background: linear-gradient(135deg, rgba(244,184,63,0.15), rgba(143,90,22,0.08));
}

.fieldset legend,
.popup-content h3 {
  color: var(--accent-2);
  text-shadow: 0 0 12px rgba(244,184,63,0.15);
}
.fieldset + .fieldset {
  background: rgba(255, 216, 107, 0.025);
  border-color: rgba(173, 111, 28, 0.55);
}

.tag {
  background: rgba(244,184,63,0.08);
  border-color: rgba(244,184,63,0.35);
  color: #f7d37a;
}
.tag:hover {
  background: var(--accent);
  color: #221104;
  border-color: var(--accent-2);
}

.table th, .table td {
  border-bottom-color: rgba(173, 111, 28, 0.5);
}
.table th {
  color: var(--accent-2);
}
.table tr[data-type="feeding"] td {
  background: rgba(244,184,63,0.09);
  color: #ffe28a;
}
.table tr[data-type="bottled"] td {
  background: rgba(181, 111, 22, 0.11);
  color: #ffd86b;
}
.table tr[data-type="racked"] td {

function compressPayload(obj) {
  try {
    if (typeof LZString === "undefined") throw new Error("LZString not loaded");
    const json = JSON.stringify(obj);
    const compressed = LZString.compressToBase64(json);
    return { __compressed: true, data: compressed };
  } catch (err) {
    console.warn("⚠️ Compression failed:", err);
    return obj;
  }
}


function decompressPayload(obj) {
  try {
    if (obj && obj.__compressed && typeof obj.data === "string" && typeof LZString !== "undefined") {
      const json = LZString.decompressFromBase64(obj.data);
      return JSON.parse(json);
    }
    return obj;
  } catch (err) {
    console.warn("⚠️ Decompression failed:", err);
    return obj;
  }
}

function load() {
  try {

    console.error('Failed to load local data', err);
    return { batches: [] };

}

function save(state) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  } catch (err) {
    console.error('Failed to save local data', err);
  }
}

  const customWrap = el('div', {
    id: 'customPercentWrap',
    style: 'display:none;margin-bottom:6px;'
  }, [
    el('label', { text: 'Custom Sugar Content (%):' }),
    el('input', {
      id: 'back_customPercent',
      type: 'number',
      step: '1',
      min: '1',
      max: '100',
      value: '75',
      style: 'width:100%;'
    })
  ]);

  const resultField = el('input', {
    id: 'back_resultKg',
    type: 'text',
    readonly: true,
    style: 'width:100%;margin-bottom:6px;'
  });

  const resultDiv = el('div', {
    id: 'backResult',
    style: 'font-size:13px;color:var(--muted);'
  });

  
  const calcBacksweet = () => {
    const sg1 = parseFloat(currentSG.value);
    const sg2 = parseFloat(desiredSG.value);
    const vol = parseFloat(volume.value);
    const type = typeSel.value;
    const customPct = parseFloat(document.getElementById('back_customPercent')?.value || '75');

    if (isNaN(sg1) || isNaN(sg2) || isNaN(vol) || sg2 <= sg1)
      return (resultDiv.textContent = '⚠️ Please enter valid SG and volume values.');

    const delta = (sg2 - sg1) * 1000;
    let sugarGrams = delta * vol * 1.53; 

    
    let label = '';
    if (type === 'honey') {
      sugarGrams /= 0.82;
      label = 'honey';
    } else if (type === 'custom') {
      sugarGrams /= (customPct / 100);
      label = 'custom sweetener';
    } else {
      label = 'sugar';
    }

    const kg = sugarGrams / 1000;
    resultField.value = kg.toFixed(3);
    resultDiv.innerHTML = `Add approximately <b>${kg.toFixed(3)} kg</b> of ${label}.`;
  };

  
  const calcBtn = el('button', {
    id: 'calcBacksweetBtn',
    class: 'btn-accent',
    text: 'Calculate Backsweetening',
    style: 'width:100%;',

function primingCard() {

    step: '0.1',

  });

  const co2Input = el('input', {
    id: 'prime_co2',
    type: 'number',
    step: '0.1',
    value: '2.5',
    style: 'width:100%;margin-bottom:6px;'
  });

  const sugarSel = el('select', {
    id: 'prime_sugar',
    style: 'width:100%;margin-bottom:6px;'
  }, [
    el('option', { value: 'dextrose', text: 'Corn Sugar (Dextrose)', selected: true }),
    el('option', { value: 'sucrose', text: 'Table Sugar (Sucrose)' }),
    el('option', { value: 'honey', text: 'Honey' })
  ]);

  const resultDiv = el('div', {
    id: 'primeResult',
    style: 'font-size:13px;color:var(--muted);'
  });

  
  const calcPriming = () => {
    const vol = parseFloat(volInput.value);
    const temp = parseFloat(tempInput.value);
    const co2 = parseFloat(co2Input.value);
    const sugarType = sugarSel.value;

    if (isNaN(vol) || isNaN(temp) || isNaN(co2)) {
      resultDiv.textContent = '⚠️ Please enter valid volume, temperature, and CO₂ level.';
      return;
    }

    
    const residualCO2 = 3.0378 - 0.050062 * temp + 0.00026555 * temp ** 2;

    
    const neededCO2 = co2 - residualCO2;
    if (neededCO2 <= 0) {
      resultDiv.textContent = 'No priming sugar needed — CO₂ already at or above target.';
      return;
    }

    
    let factor = 4.01; 
    if (sugarType === 'sucrose') factor = 3.83;
    if (sugarType === 'honey') factor = 4.52;

    const grams = neededCO2 * vol * factor;
    const tsp = grams / 4.2; 

    resultDiv.innerHTML =
      `To reach <b>${co2.toFixed(2)} volumes CO₂</b> at ${temp.toFixed(1)}°C ` +
      `for <b>${vol.toFixed(1)} L</b>, add approximately:<br>` +
      `<b>${grams.toFixed(1)} g</b> (${tsp.toFixed(1)} tsp) of ${sugarType}.`;

  const calcBtn = el('button', {

const FININGS = {
  kieselsol: {
    name: "Kieselsol",
    doseMlPerL: 1.5,
    doseText: "1.5 mL / L",
    note: "Add first, stir gently, then wait 12–24 hours."
  },
  chitosan: {
    name: "Chitosan",
    doseMlPerL: 1.0,
    doseText: "1 mL / L",
    note: "Add after Kieselsol, stir gently, then leave 1–3 days."
  },
  bentonite: {
    name: "Bentonite",
    doseGPerL: 0.5,
    doseText: "0.5 g / L",
    note: "Hydrate before use, then leave several days to clear."
  },
  sparkolloid: {
    name: "Sparkolloid",
    doseGPerL: 0.25,
    doseText: "0.25 g / L",
    note: "Prepare hot before adding, then leave 1–2 weeks."
  }
};

function calcFinings(volumeL, selected = ["kieselsol", "chitosan"]) {
  if (!volumeL || volumeL <= 0) return [];

  return selected.map(key => {
    const f = FININGS[key];
    if (!f) return null;

    let amount = 0;
    let unit = "";

    if (f.doseMlPerL) {
      amount = volumeL * f.doseMlPerL;
      unit = "mL";
    } else {
      amount = volumeL * f.doseGPerL;
      unit = "g";
    }

    return {
      key,
      name: f.name,
      doseText: f.doseText,
      amount: +amount.toFixed(2),
      unit,
      note: f.note
    };
  }).filter(Boolean);
}

        ])

    ]),

  setTimeout(updateFining, 50);

  return card;
}


function brixCard() {
  let collapsed = true;


  const brixToSG = (brix) =>
    1 + (brix / (258.6 - ((brix / 258.2) * 227.1)));
  const sgToBrix = (sg) =>
    (((182.4601 * sg - 775.6821) * sg + 1262.7794) * sg - 669.5622);


  const brixInput = el("input", {
    id: "brixInput",
    type: "number",
    step: "0.01",
    placeholder: "e.g. 20.5",
    style: "width:100%;margin-bottom:6px;"
  });

  const sgInput = el("input", {
    id: "sgInput",
    type: "number",
    step: "0.0001",
    placeholder: "e.g. 1.083",
    style: "width:100%;margin-bottom:6px;"
  });

  const resultDiv = el("div", {
    id: "brixResult",
    style: "font-size:13px;color:var(--muted);"
  });


  const convertBrixToSG = () => {
    const brix = parseFloat(brixInput.value);
    if (isNaN(brix)) return (resultDiv.textContent = "⚠️ Enter a valid Brix value.");
    const sg = brixToSG(brix);
    sgInput.value = sg.toFixed(4);
    resultDiv.innerHTML = `<b>${brix.toFixed(2)} °Bx</b> = SG <b>${sg.toFixed(4)}</b>`;
  };

  const convertSGToBrix = () => {
    const sg = parseFloat(sgInput.value);
    if (isNaN(sg)) return (resultDiv.textContent = "⚠️ Enter a valid SG value.");
    const brix = sgToBrix(sg);
    brixInput.value = brix.toFixed(2);
    resultDiv.innerHTML = `SG <b>${sg.toFixed(4)}</b> = <b>${brix.toFixed(2)} °Bx</b>`;
  };

  const clearFields = () => {
    brixInput.value = "";
    sgInput.value = "";
    resultDiv.textContent = "";
  };


  const btnBrixToSG = el("button", {
    class: "btn-accent",
    text: "Brix → SG",
    style: "flex:1;",
    onclick: convertBrixToSG
  });
  const btnSGToBrix = el("button", {
    class: "btn-accent",
    text: "SG → Brix",
    style: "flex:1;",
    onclick: convertSGToBrix
  });
  const btnClear = el("button", {
    class: "btn-danger",
    text: "Clear",
    style: "flex:1;",
    onclick: clearFields
  });

  const buttonRow = el("div", {
    class: "row",
    style: "margin-top:8px;gap:8px;"
  }, [btnBrixToSG, btnSGToBrix, btnClear]);


  const body = el("div", {
    id: "brixContent",
    style: "margin-top:8px;"
  }, [
    el("p", {
      style: "font-size:13px;color:var(--muted);",
      text: "Convert between Brix and Specific Gravity using BrewersFriend formulas."
    }),
    el("label", { text: "Brix (°Bx):" }),
    brixInput,
    el("label", { text: "Specific Gravity (SG):" }),
    sgInput,
    buttonRow,
    el("hr", { style: "margin:10px 0;border:none;border-top:1px solid var(--border);" }),
    resultDiv
  ]);


  const legend = el("legend", {
    text: "🧮 Brix ↔ SG Converter",
    style: "cursor:pointer;",
    onclick: () => {
      collapsed = !collapsed;
      body.style.display = collapsed ? "none" : "block";
      legend.textContent = (collapsed ? "▶ " : "▼ ") + "🧮 Brix ↔ SG Converter";
    }
  });


  const card = el("div", {
    id: "brixConverterCard",
    class: "fieldset collapsible",
    style: "margin-top:16px;"
  }, [legend, body]);

  collapsed = true;
  body.style.display = "none";

  return card;
}

      const key = apiInput.value.trim();

        state.cloudEnabled = false;
        updateSyncCard();
        updateViewBinButton();

      EXTENDS_API_KEY = key;

      localStorage.setItem("EXTENDS_KEY", EXTENDS_KEY);
      state.cloudEnabled = true;

      syncStatus.textContent = "☁️ Cloud API key saved.";
      console.log("☁️ Cloud API key saved:", key);

      try {
        let binId = localStorage.getItem("EXTENDS_BIN_ID") || EXTENDS_BIN_ID;

        if (!binId) {
          binId = await getExistingBin();

        console.log("☁️ Using bin:", binId);

        updateViewBinButton();
        updateSyncCard();

        const cloudData = await cloudLoad();

        if (cloudData?.batches?.length) {

          state = cloudData;
          save(state);
          render();
          alert("✅ API key saved — cloud data loaded successfully.");

  const body = el("div", {

function openBrewSheet(batch) {
  if (!batch) return alert("No batch selected.");

  const events = Array.isArray(batch.events) ? batch.events : [];
  const readings = Array.isArray(batch.sgReadings) ? batch.sgReadings : [];
  const ingredients = Array.isArray(batch.ingredients) ? batch.ingredients : [];

  const latestSG = getLatestSG(batch);
  const og = batch.og || "";
  const fg = latestSG || "";
  const abv = calcBatchABV(batch);

  // ===============================
  // TOSNA for Brew Sheet
  // ===============================
  function getBatchTosnaForSheet(batch) {
    const volumeL = parseFloat(batch.volume);
    const sg = parseFloat(batch.og);

    if (!isFinite(volumeL) || volumeL <= 0 || !isFinite(sg) || sg <= 1) {
      return null;
    }

    // Defaults for now
    const requirement = batch.tosnaRequirement || "medium";
    const nutrientType = batch.tosnaNutrientType || "OKDAP";
    const goFermType = batch.tosnaGoFermType || "goferm";

    if (typeof calculateTosna !== "function") return null;

    return calculateTosna({
      volumeL,
      sg,
      requirement,
      nutrientType,
      goFermType
    });
  }

  function formatDose(row) {
    const parts = [];

    if (row.fermaidO && row.fermaidO > 0) {
      parts.push(`${row.fermaidO.toFixed(2)}g Fermaid O`);
    }

    if (row.fermaidK && row.fermaidK > 0) {
      parts.push(`${row.fermaidK.toFixed(2)}g Fermaid K`);
    }

    if (row.dap && row.dap > 0) {
      parts.push(`${row.dap.toFixed(2)}g DAP`);
    }

    return parts.length ? parts.join(" + ") : "No nutrient addition";
  }

  function formatTosnaInstruction(row, batch) {
    const dose = formatDose(row);

    if (row.time === "24 hours") {
      return `At 24 hours after yeast pitch, add ${dose} to your must.`;
    }

    if (row.time === "48 hours") {
      return `At 48 hours after yeast pitch, add ${dose} to your must.`;
    }

    if (row.time === "72 hours") {
      return `At 72 hours after yeast pitch, add ${dose} to your must.`;
    }

    if (row.time === "1/3 sugar break") {
      const sugarBreak = calcSugarBreak(batch.og);
      return `When the must reaches the 1/3 sugar break${sugarBreak ? `, around SG ${sugarBreak}` : ""}, but no later than 7 days after yeast pitch, add ${dose} to your must.`;
    }

    return `${row.time}: add ${dose}.`;
  }

  const tosna = getBatchTosnaForSheet(batch);

  const tosnaRows = tosna?.schedule?.length
    ? tosna.schedule.map(row => `
      <tr>
        <td>${escapeHtml(row.time)}</td>
        <td>${escapeHtml(row.fermaidO ? row.fermaidO.toFixed(2) + " g" : "—")}</td>
        <td>${escapeHtml(row.fermaidK ? row.fermaidK.toFixed(2) + " g" : "—")}</td>
        <td>${escapeHtml(row.dap ? row.dap.toFixed(2) + " g" : "—")}</td>
      </tr>
    `).join("")
    : `<tr><td colspan="4">No TOSNA schedule available.</td></tr>`;

  const tosnaInstructions = tosna?.schedule?.length
    ? tosna.schedule.map(row => `
      <li>${escapeHtml(formatTosnaInstruction(row, batch))}</li>
    `).join("")
    : `<li>No nutrient schedule calculated for this batch.</li>`;

  const eventRows = events.length
    ? events.map(ev => `
      <tr>
        <td>${escapeHtml(fmt(ev.date) || ev.date || "")}</td>
        <td>${escapeHtml(ev.type || ev.name || "")}</td>
        <td>${escapeHtml(ev.note || ev.notes || ev.sg || "")}</td>
      </tr>
    `).join("")
    : `<tr><td colspan="3">No events recorded.</td></tr>`;

  const readingRows = readings.length
    ? readings.map(r => `
      <tr>
        <td>${escapeHtml(fmt(r.date) || r.date || "")}</td>
        <td>${escapeHtml(r.sg || "")}</td>
        <td>${escapeHtml(r.note || r.notes || "")}</td>
      </tr>
    `).join("")
    : `<tr><td colspan="3">No gravity readings recorded.</td></tr>`;

  const ingredientRows = ingredients.length
    ? ingredients.map(i => `
      <tr>
        <td>${escapeHtml(i.honey || "—")}</td>
        <td>${escapeHtml(i.sugar || "—")}</td>
        <td>${escapeHtml(i.water || "—")}</td>
        <td>${escapeHtml(i.additives || "—")}</td>
      </tr>
    `).join("")
    : `<tr><td colspan="4">No ingredients recorded.</td></tr>`;

  const bottledEvent = events.find(e => e.type === "bottled");
  const backsweetened = hasBacksweetenedEvent(batch);

  const html = `
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Brew Sheet - ${escapeHtml(batch.name || "Untitled Batch")}</title>

  <style>

      color: var(--muted);

    }

      border: 1px solid var(--line);
      padding: 8px;

    }

      background: var(--soft);
    }

      margin-top: 8px;

    }

    }

      white-space: pre-wrap;
      border: 1px solid var(--line);
      padding: 10px;
      min-height: 70px;
      background: #fff;
    }

    .print-actions {
      text-align: right;

      padding: 8px 14px;

function field(label, value) {
  return `
    <div class="field">
      <span class="label">${escapeHtml(label)}:</span>
      ${escapeHtml(value || "")}
    </div>
  `;
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[ch]));
}

/* ===============================
   TOSNA Calculator - MeadTools + ABV
   =============================== */

const TOSNA = {
  yanFromFermaidO: 40,
  yanFromFermaidK: 100,
  yanFromDAP: 210,

  organicMultiplierWithGoFerm: 4,
  organicMultiplierNoGoFerm: 3,

  tspPerGramFermaidO: 0.25,
  tspPerGramFermaidK: 0.20,
  tspPerGramDAP: 0.20
};

function tosnaToBrix(sg) {
  return -668.962 + 1262.45 * sg - 776.43 * sg ** 2 + 182.94 * sg ** 3;
}

function getTosnaSGFromTargetABV(targetABV, fg = 1.000) {
  return fg + targetABV / 131.25;
}

function getTosnaNitrogenMultiplier(requirement) {
  if (requirement === "veryLow") return 0.75;
  if (requirement === "low") return 0.75;
  if (requirement === "medium") return 0.9;
  if (requirement === "high") return 1.25;
  if (requirement === "veryHigh") return 1.8;
  return 0.9;
}

function getTosnaTargetYAN({ sg, requirement }) {
  const SG = parseFloat(sg);
  if (!isFinite(SG) || SG <= 1) return 0;

  const brix = tosnaToBrix(SG);
  const sugarGPL = brix * SG * 10;
  const multiplier = getTosnaNitrogenMultiplier(requirement);

  return Math.round(sugarGPL * multiplier);
}

function calculateTosna({ volumeL, sg, requirement, nutrientType, goFermType }) {
  const targetYAN = getTosnaTargetYAN({ sg, requirement });

  const organicMultiplier =
    goFermType === "none"
      ? TOSNA.organicMultiplierNoGoFerm
      : TOSNA.organicMultiplierWithGoFerm;

  const effectiveFermaidOYan = TOSNA.yanFromFermaidO * organicMultiplier;
  const schedule = [];

  if (nutrientType === "O") {
    const totalO = (targetYAN / effectiveFermaidOYan) * volumeL;

    schedule.push(
      { time: "24 hours", fermaidO: totalO * 0.25, fermaidK: 0, dap: 0 },
      { time: "48 hours", fermaidO: totalO * 0.25, fermaidK: 0, dap: 0 },
      { time: "72 hours", fermaidO: totalO * 0.25, fermaidK: 0, dap: 0 },
      { time: "1/3 sugar break", fermaidO: totalO * 0.25, fermaidK: 0, dap: 0 }
    );
  }

  if (nutrientType === "OK") {
    const yanFromO = targetYAN * 0.45;
    const yanFromK = targetYAN * 0.55;

    const totalO = (yanFromO / effectiveFermaidOYan) * volumeL;
    const totalK = (yanFromK / TOSNA.yanFromFermaidK) * volumeL;

    schedule.push(
      { time: "24 hours", fermaidO: totalO * 0.5, fermaidK: 0, dap: 0 },
      { time: "48 hours", fermaidO: totalO * 0.5, fermaidK: 0, dap: 0 },
      { time: "72 hours", fermaidO: 0, fermaidK: totalK * 0.5, dap: 0 },
      { time: "1/3 sugar break", fermaidO: 0, fermaidK: totalK * 0.5, dap: 0 }
    );
  }

  if (nutrientType === "OKDAP") {
    const yanFromO = targetYAN * 0.45;
    const yanFromK = targetYAN * 0.50;
    const yanFromDAP = targetYAN * 0.05;

    const totalO = (yanFromO / effectiveFermaidOYan) * volumeL;
    const totalK = (yanFromK / TOSNA.yanFromFermaidK) * volumeL;
    const totalDAP = (yanFromDAP / TOSNA.yanFromDAP) * volumeL;

    schedule.push(
      { time: "24 hours", fermaidO: totalO * 0.5, fermaidK: 0, dap: 0 },
      { time: "48 hours", fermaidO: totalO * 0.5, fermaidK: 0, dap: 0 },
      { time: "72 hours", fermaidO: 0, fermaidK: totalK * 0.5, dap: totalDAP * 0.5 },
      { time: "1/3 sugar break", fermaidO: 0, fermaidK: totalK * 0.5, dap: totalDAP * 0.5 }
    );
  }

  const totals = schedule.reduce((sum, row) => {
    sum.fermaidO += row.fermaidO;
    sum.fermaidK += row.fermaidK;
    sum.dap += row.dap;
    return sum;
  }, { fermaidO: 0, fermaidK: 0, dap: 0 });

  return { targetYAN, schedule, totals };
}

  function updateEstimate() {

    const sg = getTosnaSGFromTargetABV(abv, fg);

  return card;

// === Mobile Sidebar Drawer System ===
function initMobileSidebar() {
  // Remove old instances if reloaded
  document.getElementById('sidebarToggle')?.remove();
  document.getElementById('sidebarDrawer')?.remove();
  document.getElementById('sidebarOverlay')?.remove();

  // Create core elements
  const toggleBtn = el('button', {
    id: 'sidebarToggle',
    'aria-label': 'Toggle menu',
    text: '☰'
  });
  const drawer = el('aside', { id: 'sidebarDrawer' });
  const overlay = el('div', { id: 'sidebarOverlay' });

  // Insert before .app so it's top-level
  const app = document.querySelector('.app');
  if (app) {
    document.body.insertBefore(toggleBtn, app);
    document.body.insertBefore(drawer, app);
    document.body.insertBefore(overlay, app);
  }

  // === Helper: attach open/close logic ===
  function attachDrawerListeners() {
    toggleBtn.onclick = () => {
      drawer.classList.toggle('open');
      overlay.classList.toggle('visible');
    };
    overlay.onclick = () => {
      drawer.classList.remove('open');
      overlay.classList.remove('visible');
    };
  }

  // === Helper: rebuild collapsible interactivity inside the drawer ===
function reattachCollapsibles(target) {
  // Handle fieldset collapsibles (Utilities, Cloud Sync, etc.)
  target.querySelectorAll('.fieldset.collapsible legend').forEach(legend => {
    legend.addEventListener('click', () => {
      const fs = legend.parentElement;
      fs.classList.toggle('collapsed');
      const content = Array.from(fs.children).find(c => c.tagName !== 'LEGEND');
      if (content)
        content.style.display = fs.classList.contains('collapsed') ? 'none' : 'block';
    });
  });

  // Handle Active / Archived batch sections
  target.querySelectorAll('.row[onclick]').forEach(row => {
    const clone = row.cloneNode(true);
    clone.addEventListener('click', () => {
      const key = row.textContent.includes('Active') ? 'active' : 'archived';
      sidebarCollapse[key] = !sidebarCollapse[key];
      renderBatchList();
      const drawer = document.getElementById('sidebarDrawer');
      if (drawer) {
        drawer.innerHTML = document.querySelector('.sidebar').innerHTML;
        reattachCollapsibles(drawer);
      }
    });
    row.replaceWith(clone);
  });
}


  // === Render the sidebar content into the drawer ===
  const desktopSidebar = document.querySelector('.sidebar');
  if (desktopSidebar) {
    drawer.innerHTML = '';
    const tempSidebar = el('div', { class: 'sidebar-temp' });
    drawer.append(tempSidebar);
    renderSidebar(); // reuse your existing function
    const built = document.querySelector('.sidebar');
    if (built) drawer.innerHTML = built.innerHTML;
  }

  // Re-activate collapsibles and button logic
  reattachCollapsibles(drawer);
  attachDrawerListeners();

  // Return helpers for reuse (sync observer)
  return { attachDrawerListeners, reattachCollapsibles };
}

// Run after the app is rendered
document.addEventListener('DOMContentLoaded', () => {
  const { attachDrawerListeners, reattachCollapsibles } = initMobileSidebar();

  // Watch for sidebar changes and mirror into the drawer
  const sidebar = document.querySelector('.sidebar');
  if (sidebar) {
    const obs = new MutationObserver(() => {
      const drawer = document.getElementById('sidebarDrawer');
      if (drawer && sidebar) {
        drawer.innerHTML = sidebar.innerHTML;
        reattachCollapsibles(drawer);
        attachDrawerListeners();
      }
    });
    obs.observe(sidebar, { childList: true, subtree: true });
  }
});

function renderBatchList() {
  const list = document.getElementById('batchList');
  if (!list) return;

  list.innerHTML = '';

  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  const sorted = [...state.batches]
    .sort((a, b) => new Date(b.startDate) - new Date(a.startDate))
    .filter(b =>
      !q ||
      b.name.toLowerCase().includes(q) ||
      (b.description || '').toLowerCase().includes(q)
    );

  const active = sorted.filter(b => !b.events.some(e => e.type === 'bottled'));
  const archived = sorted.filter(b => b.events.some(e => e.type === 'bottled'));

  const makeSection = (key, title, batches, emptyText) => {
    const isCollapsed = sidebarCollapse[key];
    const section = el('div', { class: 'fieldset', style: 'margin-bottom:12px;' });

    const header = el(
      'div',
      {
        class: 'row',
        style: `
          display:flex;
          align-items:center;
          gap:6px;
          cursor:pointer;
          user-select:none;
        `,
        onclick: () => {
          sidebarCollapse[key] = !sidebarCollapse[key];
          renderBatchList();
        }
      },
      [
        el('legend', { text: title }),
        el('span', {
          text: isCollapsed ? '▶' : '▼',
          style: 'font-size:14px;margin-left:4px;'
        })
      ]
    );

    section.append(header);

    if (isCollapsed) return section;

    if (!batches.length) {
      section.append(el('div', { class: 'empty', text: emptyText }));
      return section;
    }

    batches.forEach(b => {
      const item = el('div', { class: 'batch' });

      // === Name ===
      const nameEl = el('div', {
        class: 'batchName',
        text: b.name,
        style: 'font-weight:600;cursor:default;'
      });

      // === 📄 Brew Sheet Button ===
const brewSheetBtn = el('button', {
  text: '📄 Brew',
  class: 'btn-accent',
  title: 'Open Brew Sheet',
  style: 'padding:2px 7px;font-size:11px;border-radius:8px;white-space:nowrap;',
  onclick: e => {
    e.stopPropagation();
    openBrewSheet(b);
  }
});

      // === Delete Button ===
      const delBtn = el('button', {
        text: '✕',
        class: 'btn-danger',
        title: 'Delete batch',
        onclick: async e => {
          e.stopPropagation();
          if (!confirm(`Delete batch “${b.name}”? This cannot be undone.`)) return;

          state.batches = state.batches.filter(x => x.id !== b.id);
          if (selectedId === b.id) selectedId = state.batches[0]?.id || null;
          save(state);

          if (EXTENDS_BIN_ID && EXTENDS_KEY) {
            const cloud = await cloudLoad();
            if (cloud?.batches) {
              cloud.batches = cloud.batches.filter(x => x.id !== b.id);
              await cloudSave(cloud, true);
            }
          }

          renderBatchList();
          render();
        }
      });

      // === Buttons grouped ===
      const actionBtns = el('div', {
        class: 'row',
        style: 'gap:4px;'
      }, [brewSheetBtn, delBtn]);

      // === Header row ===
      const headerRow = el('div', {
        class: 'row',
        style: 'justify-content:space-between;align-items:center;'
      }, [nameEl, actionBtns]);

      // === Meta ===
      const latestSG = getLatestSG(b);
      const abv = calcBatchABV(b);

      const bottledEvent = b.events.find(e => e.type === 'bottled');

      const metaText =
        `${fmt(b.startDate)} · OG ${b.og}` +
        (latestSG ? ` · FG ${latestSG}` : '') +
        (abv ? ` · ${getABVDisplayLabel(b)}` : '');

      const metaDiv = el('div', { class: 'meta', text: metaText });

      // === Tags ===
      const tagsRow = el('div', {
        class: 'row',
        style: 'flex-wrap:wrap;gap:4px;margin-top:4px;'
      });

      if (Array.isArray(b.tags) && b.tags.length > 0) {
        b.tags.forEach(tag => {
          tagsRow.append(el('span', { class: 'tag', text: tag }));
        });
      }

      item.append(headerRow, metaDiv, tagsRow);

      item.classList.toggle('active', b.id === selectedId);

      item.addEventListener('click', () => {
        selectedId = b.id;
        render();
      });

      section.append(item);
    });

    return section;
  };

  const sidebarSections = [
    batchHeaderCard,
    () => makeSection('active', '🧪 Active Batches', active, 'No active batches.'),
    () => makeSection('archived', '🍾 Archived (Bottled)', archived, 'No bottled batches.'),
    utilitiesHeaderCard,
    tosnaCard,
    backsweetCard,
    dilutionCard,
    primingCard,
    stabilCard,
    finingCard,
    brixCard,
    backupHeaderCard,
    syncCard
  ];

  for (const create of sidebarSections) {
    try {
      const node = create();
      if (node) list.append(node);
    } catch (err) {
      console.error('Sidebar section error:', err);
    }
  }
}


function renderTagsSection(batch) {
  if (!Array.isArray(batch.tags)) batch.tags = [];

  const wrap = el("div", {
    class: "fieldset",
    style: "margin-top:16px;"
  }, [
    el("legend", { text: "🏷️ Tags", style: "font-weight:600;" })
  ]);

  const tagContainer = el("div", {
    class: "row",
    style: `
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    `
  });

  // Render current tags
  const renderTags = () => {
    tagContainer.innerHTML = "";
    if (batch.tags.length === 0) {
      tagContainer.append(el("span", {
        class: "tag",
        text: "No tags selected",
        style: "opacity:0.6;"
      }));
    } else {
      batch.tags.forEach(tag => {
        const t = el("span", {
          class: "tag",
          text: `❌ ${tag}`,
          style: `
            cursor:pointer;
            background:#1a2028;
            color:var(--accent);
            border-color:#2f3b4b;
          `,
          onclick: () => {
            batch.tags = batch.tags.filter(x => x !== tag);
            saveAll(state, batch, ["tags"]);
            render();
          }
        });
        tagContainer.append(t);
      });
    }

    // Add button to add new tags
    const addBtn = el("button", {
      class: "btn-accent",
      text: "+ Add Tag",
      style: "padding:3px 10px;font-size:12px;",
      onclick: openTagSelector
    });
    tagContainer.append(addBtn);
  };

  // Popup tag selector
  const openTagSelector = () => {
    const overlay = el("div", {
      class: "popup",
      style: "z-index:9999;"
    }, [
      el("div", { class: "popup-content" }, [
        el("h3", { text: "Select Tags" }),
        el("div", {
          style: `
            display:flex;
            flex-wrap:wrap;
            gap:6px;
            margin-bottom:10px;
          `
        }, TAGS.map(tag =>
          el("span", {
            class: "tag",
            text: tag,
            style: `
              cursor:pointer;
              background:${batch.tags.includes(tag) ? 'var(--accent)' : '#1a2028'};
              color:${batch.tags.includes(tag) ? '#fff' : 'var(--text)'};
            `,
            onclick: () => {
              if (batch.tags.includes(tag)) {
                batch.tags = batch.tags.filter(t => t !== tag);
              } else {
                batch.tags.push(tag);
              }
              saveAll(state, batch, ["tags"]);
              render();
            }
          })
        )),
        el("div", { class: "popup-actions" }, [
          el("button", {
            class: "secondary",
            text: "Close",
            onclick: () => overlay.remove()
          })
        ])
      ])
    ]);
    document.body.append(overlay);
  };

  wrap.append(tagContainer);
  renderTags();
  return wrap;
}

function renderDetail() {
  const root = document.getElementById('detail');
  if (!root) return;

  const batch = state.batches.find(b => b.id === selectedId);

  if (!batch) {
    root.innerHTML = '';
    root.append(newBatchForm());
    return;
  }

  root.innerHTML = '';

  const titleRow = (() => {
    const row = el('div', {
      class: 'row',
      style: 'justify-content: space-between; align-items: center;'
    });

    const title = el('h2', {
      text: batch.name,
      title: 'Click to rename batch'
    });
    title.style.cursor = 'pointer';
    title.addEventListener('click', () => {
      const input = el('input', {
        type: 'text',
        value: batch.name,
        class: 'wide',
        style: `
          font-size:20px;
          font-weight:700;
          border:1px solid var(--border);
          background:#0f141b;
          color:var(--text);
          border-radius:8px;
          padding:6px 10px;
        `
      });

      const commit = () => {
        const newName = input.value.trim();
        if (newName) batch.name = newName;
        saveAll(state, batch, ['name']);
        render();
      };

      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') render();
      });

      title.replaceWith(input);
      input.focus();
      input.select();
    });

    const dupBtn = el('button', {
      text: '🔁 Duplicate',
      class: 'btn-accent',
      title: 'Duplicate this batch',
      style: 'padding:4px 10px;font-size:13px;',
      onclick: () => {
        if (!confirm(`Duplicate batch “${batch.name}”?`)) return;
        const today = new Date().toISOString().slice(0, 10);
        const id = crypto.randomUUID();
        const clone = {
          id,
          name: batch.name + ' (Copy)',
          startDate: today,
          og: batch.og,
          honey: batch.honey,
          yeast: batch.yeast,
          volume: batch.volume,
          description: batch.description,
          sgReadings: [],
          events: [{ date: today, type: 'primary fermentation' }],
          ingredients: JSON.parse(JSON.stringify(batch.ingredients || []))
        };
        state.batches.push(clone);
        selectedId = id;
        saveAll(state);
        render();
        alert(`Batch “${batch.name}” duplicated as “${clone.name}”.`);
      }
    });

    const labelBtn = el('button', {
      text: '🖨️ Label Maker',
      class: 'btn-accent',
      title: 'Generate a printable bottle label',
      style: 'padding:4px 10px;font-size:13px;',
      onclick: () => openLabelMaker(batch)
    });

    row.append(title, dupBtn, labelBtn);
    return row;
  })();

  const summarySection = (() => {
    const sugarBreak = calcSugarBreak(batch.og);

    const currentSG = getLatestSG(batch);
    const abv = calcBatchABV(batch);
    console.log('Current SG reading for', batch.name, ':', currentSG, batch.sgReadings);

    const textParts = [];
    if (batch.startDate) textParts.push(`Started ${fmt(batch.startDate)}`);
    if (batch.og) textParts.push(`OG ${batch.og}`);
    if (currentSG) textParts.push(`SG ${currentSG}`);
    if (abv) textParts.push(hasBacksweetenedEvent(batch) ? `ABV ${abv.toFixed(1)}% after backsweetening` : `ABV ${abv.toFixed(1)}%`);
    if (sugarBreak) textParts.push(`1/3 Break: ${sugarBreak}`);

    const metaLine = el('div', { text: textParts.join(' · ') });
    const honeyLine = el('div', {
      class: 'meta',
      text:
        `${batch.honey ? 'Honey: ' + batch.honey + ' · ' : ''}` +
        `${batch.yeast ? 'Yeast: ' + batch.yeast + ' · ' : ''}` +
        `${batch.volume ? 'Volume: ' + batch.volume + 'L' : ''}`
    });

    return el('div', {}, [metaLine, honeyLine]);
  })();

const components = [
  chartCard(batch),
  sgFormCard(batch),
  eventFormCard(batch),
  ingredientsTable(batch),
  renderTagsSection(batch),
  eventsTable(batch)
];

  const container = el('div', {}, [titleRow, summarySection, ...components]);
  root.append(container);

  drawChart(batch);
}

function calcSugarBreak(og) {
  const ogNum = parseFloat(og);
  if (!isFinite(ogNum) || ogNum < 0.9 || ogNum > 1.5) return null;
  const sgBreak = 1 + (ogNum - 1) / 3;
  return sgBreak.toFixed(3);
}


function calcABV(og, fg) {
  if (!og || !fg) return null;
  const OG = parseFloat(og), FG = parseFloat(fg);
  if (!isFinite(OG) || !isFinite(FG)) return null;
  return (OG - FG) * 131.25;
}

function hasBacksweetenedEvent(batch) {
  return Array.isArray(batch?.events) &&
    batch.events.some(e => e && e.type === 'backsweetened');
}

function getBacksweetenedEvents(batch) {
  return (batch?.events || [])
    .filter(e => e && e.type === 'backsweetened')
    .slice()
    .sort((a, b) => new Date(a.date) - new Date(b.date));
}

function getLatestSG(batch) {
  const readings = (batch?.sgReadings || [])
    .slice()
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  if (!readings.length) return null;
  const last = readings[readings.length - 1];
  const sg = typeof last === 'object' ? parseFloat(last.sg) : parseFloat(last);
  return isFinite(sg) ? sg : null;
}

function getLastSGBeforeDate(batch, cutoffDate) {
  const cutoffTs = new Date(cutoffDate).getTime();
  const readings = (batch?.sgReadings || [])
    .slice()
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .filter(r => {
      const t = new Date(r.date).getTime();
      return isFinite(t) && (!isFinite(cutoffTs) || t <= cutoffTs);
    });

  if (!readings.length) return null;
  const last = readings[readings.length - 1];
  const sg = typeof last === 'object' ? parseFloat(last.sg) : parseFloat(last);
  return isFinite(sg) ? sg : null;
}

function getBacksweeteningAddedVolumeLitres(batch) {
  const HONEY_DENSITY_G_PER_ML = 1.42;
  const NON_LIQUID_ML_PER_G = 0.625;

  return getBacksweetenedEvents(batch).reduce((total, ev) => {
    const honeyGrams = parseFloat(ev.honeyGrams || 0);
    const nonLiquidGrams = parseFloat(ev.nonLiquidGrams || 0);
    const liquidLitres = parseFloat(ev.liquidLitres || 0);

    const honeyLitres = isFinite(honeyGrams)
      ? (honeyGrams / HONEY_DENSITY_G_PER_ML) / 1000
      : 0;

    const nonLiquidLitres = isFinite(nonLiquidGrams)
      ? (nonLiquidGrams * NON_LIQUID_ML_PER_G) / 1000
      : 0;

    return total + honeyLitres + nonLiquidLitres + (isFinite(liquidLitres) ? liquidLitres : 0);
  }, 0);
}

function calcBatchABV(batch) {
  if (!batch?.og) return null;

  const OG = parseFloat(batch.og);
  if (!isFinite(OG)) return null;

  const latestSG = getLatestSG(batch);
  if (!isFinite(latestSG)) return null;

  if (!hasBacksweetenedEvent(batch)) {
    return calcABV(OG, latestSG);
  }

  const firstBacksweetened = getBacksweetenedEvents(batch)[0];
  const trueFG = getLastSGBeforeDate(batch, firstBacksweetened?.date) ?? latestSG;
  const abvBeforeBacksweetening = calcABV(OG, trueFG);

  const volumeBefore = parseFloat(batch.volume);
  const addedVolume = getBacksweeteningAddedVolumeLitres(batch);
  const finalVolumeOverride = parseFloat(firstBacksweetened?.finalVolumeLitres || 0);

  if (!isFinite(abvBeforeBacksweetening)) return null;

  if (isFinite(finalVolumeOverride) && finalVolumeOverride > 0 && isFinite(volumeBefore) && volumeBefore > 0) {
    return abvBeforeBacksweetening * (volumeBefore / finalVolumeOverride);
  }

  if (!isFinite(volumeBefore) || volumeBefore <= 0 || addedVolume <= 0) {
    return abvBeforeBacksweetening;
  }

  return abvBeforeBacksweetening * (volumeBefore / (volumeBefore + addedVolume));
}

function getABVDisplayLabel(batch) {
  const abv = calcBatchABV(batch);
  if (!isFinite(abv)) return null;
  return hasBacksweetenedEvent(batch)
    ? `~${abv.toFixed(1)}% ABV after backsweetening`
    : `~${abv.toFixed(1)}% ABV`;
}

function getABVFormulaLabel(batch) {
  return hasBacksweetenedEvent(batch)
    ? 'ABV uses ((OG − FG_true) × 131.25) × (V_before ÷ V_after)'
    : 'ABV uses (OG − FG) × 131.25';
}

function getBacksweetenCutoffTs(batch) {
  // earliest backsweetened event (first time you sweeten)
  const times = (batch.events || [])
    .filter(e => e && e.type === 'backsweetened' && e.date)
    .map(e => new Date(e.date).getTime())
    .filter(t => !isNaN(t));
  return times.length ? Math.min(...times) : null;
}

function getLastFermentationSGBefore(batch, cutoffTs = null) {
  const readings = (batch.sgReadings || [])
    .slice()
    .sort((a, b) => new Date(a.date) - new Date(b.date));
  if (!readings.length) return null;

  const filtered = cutoffTs == null
    ? readings
    : readings.filter(r => new Date(r.date).getTime() <= cutoffTs);

  if (!filtered.length) return null;
  const last = filtered[filtered.length - 1];
  const val = parseFloat(last.sg);
  return isFinite(val) ? val : null;
}

function formatMaturityDays(bottledDate) {
  const diffMs = Date.now() - new Date(bottledDate).getTime();
  const days = Math.floor(diffMs / 86400000);

  if (isNaN(days)) return 'Unknown age';
  if (days < 0) return 'Future date';
  if (days === 0) return 'Bottled today';
  if (days === 1) return '1 day old';
  if (days < 7) return `${days} days old`;

  const weeks = Math.floor(days / 7);
  if (weeks < 8) return `${weeks} week${weeks !== 1 ? 's' : ''} old`;

  const months = Math.floor(days / 30.44);
  const remainingDays = Math.round(days - months * 30.44);
  const extraWeeks = Math.floor(remainingDays / 7);

  let result = `${months} month${months !== 1 ? 's' : ''}`;
  if (extraWeeks >= 1) result += ` ${extraWeeks} wk`;
  return result + ' old';
}

function formatFermentationDays(startDate) {
  const diffMs = Date.now() - new Date(startDate).getTime();
  const days = Math.floor(diffMs / 86400000);

  if (isNaN(days)) return 'Unknown start date';
  if (days < 0) return 'Future start date';
  if (days === 0) return 'Started today';
  if (days === 1) return 'Fermenting for 1 day';
  if (days < 7) return `Fermenting for ${days} days`;

  const weeks = Math.floor(days / 7);
  if (weeks < 8) return `Fermenting for ${weeks} week${weeks !== 1 ? 's' : ''}`;

  const months = Math.floor(days / 30.44);
  const remainingDays = Math.round(days - months * 30.44);
  const extraWeeks = Math.floor(remainingDays / 7);

  let result = `Fermenting for ${months} month${months !== 1 ? 's' : ''}`;
  if (extraWeeks >= 1) result += ` ${extraWeeks} wk`;
  return result;
}

}

function getLastFermentationSGBefore(batch, cutoffTs = null) {

  const filtered = cutoffTs == null
    ? readings

  if (!filtered.length) return null;

}


function calcBatchABVForReading(batch, reading) {
  if (!batch || !reading) return null;
  const sg = parseFloat(reading.sg);
  if (!isFinite(sg)) return null;

  if (!hasBacksweetenedEvent(batch)) {
    return calcABV(batch.og, sg);
  }

  const firstBacksweetened = getBacksweetenedEvents(batch)[0];
  const readingTs = new Date(reading.date).getTime();
  const sweetTs = new Date(firstBacksweetened?.date).getTime();

  if (!isFinite(readingTs) || !isFinite(sweetTs) || readingTs < sweetTs) {
    return calcABV(batch.og, sg);
  }

  return calcBatchABV(batch);
}

      .filter(v => isFinite(v));

    // ✅ Reached if *any* pre-sweetening SG <= break target
    const reached = preSweetReadings.some(v => v <= parseFloat(sugarBreak));

    ctx.save();
    ctx.beginPath();
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = reached ? '#00cc66' : '#ffaa33'; // ✅ green if achieved before sweetening
    ctx.lineWidth = 1.2;
    ctx.moveTo(pad.l, yBreak);
    ctx.lineTo(pad.l + W, yBreak);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = reached ? '#00cc66' : '#ffaa33';
    ctx.beginPath();
    ctx.arc(pad.l + W - 8, yBreak, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '12px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText('1/3 Break', pad.l + 8, yBreak - 6);
    ctx.restore();
  }
}

    // Points
    points.forEach((p, i) => {
      ctx.beginPath();
      if (i === 0) {
        ctx.fillStyle = '#ffd966';
        ctx.arc(p.xx, p.yy, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = '12px system-ui';
        ctx.fillStyle = '#ccc';
        ctx.fillText('OG', p.xx + 12, p.yy + 4);
      } else {
        ctx.fillStyle = chartMode === 'sg' ? '#b5e08a' : '#82cfff';
        ctx.arc(p.xx, p.yy, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    if (highlight) {
      ctx.beginPath();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.arc(highlight.xx, highlight.yy, 7, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
  };

  renderBase();

  // Tooltip logic
  const radius = 14;
  c.onmousemove = evt => {
    const rect = c.getBoundingClientRect();
    const scaleX = c.width / rect.width;
    const scaleY = c.height / rect.height;
    const mx = (evt.clientX - rect.left) * scaleX / dpr;
    const my = (evt.clientY - rect.top) * scaleY / dpr;

    let nearest = null;
    let minDist = radius;
    for (const p of points) {
      const dx = p.xx - mx;
      const dy = p.yy - my;
      const dist = Math.sqrt(dx * dx + dy * dy * 0.6);
      if (dist < minDist) {
        nearest = p;
        minDist = dist;
      }
    }

    if (nearest) {
      renderBase(nearest);
      tooltip.style.display = 'block';

      const left = nearest.xx / dpr + 12;
      const top = nearest.yy / dpr - 28;
      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;

      const dateLabel = new Date(nearest.x).toLocaleDateString();
      const valueLabel =
        chartMode === 'sg'
          ? `SG: ${nearest.sg?.toFixed(3) ?? '—'}`
          : `ABV: ${nearest.y?.toFixed(1) ?? '—'}%`;
      const sugarLabel = sugarBreak
        ? `<div style="color:#ffaa33;">1/3 Break: ${sugarBreak}</div>`
        : '';

      tooltip.innerHTML = `
        <div><b>${dateLabel}</b></div>
        <div>${valueLabel}</div>
        ${sugarLabel}
      `;
    } else {
      tooltip.style.display = 'none';
      renderBase();
    }
  };

  c.onmouseleave = () => {
    tooltip.style.display = 'none';
    renderBase();
  };
}

function createBottleSafeQR({
  data,
  qrSize = 320,          // size of QR itself (px)
  borderRatio = 0.30,    // 30% border = bottle safe
}) {
  // --- generate base QR ---
  const qrCanvas = document.createElement('canvas');

  QRCode.toCanvas(qrCanvas, data, {
    width: qrSize,
    errorCorrectionLevel: 'H', // 🔥 critical for curved surfaces
    margin: 4,
    color: {
      dark: '#000000',
      light: '#ffffff'
    }
  });

  // --- calculate border ---
  const borderPx = Math.round(qrSize * borderRatio);
  const finalSize = qrSize + borderPx * 2;

  // --- output canvas ---
  const out = document.createElement('canvas');
  out.width = finalSize;
  out.height = finalSize;

  const ctx = out.getContext('2d');

  // solid white border (quiet zone booster)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, finalSize, finalSize);

  // draw QR centered
  ctx.drawImage(qrCanvas, borderPx, borderPx);

  return out;
}

function calcBacksweetening() {
  const sg1 = parseFloat(document.getElementById('back_currentSG').value);
  const sg2 = parseFloat(document.getElementById('back_desiredSG').value);
  const vol = parseFloat(document.getElementById('back_volume').value);
  const type = document.getElementById('back_type').value;
  const customPercent = parseFloat(document.getElementById('back_customPercent').value);

  if (isNaN(sg1) || isNaN(sg2) || isNaN(vol)) {
    alert("Please enter valid SG values and volume.");
    return;
  }


  const sgToGpl = sg => (182.4601 * sg ** 3) - (775.6821 * sg ** 2) + (1262.7794 * sg) - 669.5622;
  const sugarCurrent = sgToGpl(sg1);
  const sugarDesired = sgToGpl(sg2);
  const sugarDiff = sugarDesired - sugarCurrent;

  const sugarKg = (sugarDiff * vol) / 1000; 


  let factor = 1;
  let label = "sugar";

  if (type === "honey") {
    factor = 0.82;
    label = "honey";
  } else if (type === "custom") {
    if (isNaN(customPercent) || customPercent <= 0 || customPercent > 100) {
      alert("Please enter a valid custom sugar % between 1–100.");
      return;
    }
    factor = customPercent / 100;
    label = `${customPercent}% custom sweetener`;
  }

  const requiredKg = sugarKg / factor;

  document.getElementById('back_resultKg').value = requiredKg.toFixed(3);
  document.getElementById('backResult').innerHTML = `
    <b>Result:</b><br>
    • Add <b>${requiredKg.toFixed(3)} kg</b> of ${label}<br>
    (to raise SG from ${sg1.toFixed(3)} → ${sg2.toFixed(3)})
  `;
}

function calcDilution() {
  const sg1 = parseFloat(document.getElementById('dil_current').value);
  const sg2 = parseFloat(document.getElementById('dil_target').value);
  const vol = parseFloat(document.getElementById('dil_volume').value);

  if (isNaN(sg1) || isNaN(sg2) || isNaN(vol) || sg2 >= sg1) {
    alert("Enter valid numbers (target SG must be lower than current).");
    return;
  }

  const waterToAdd = vol * ((sg1 - sg2) / sg2);
  document.getElementById('dilResult').innerHTML =
    `Add approximately <b>${waterToAdd.toFixed(2)} L</b> of water to reduce from ${sg1.toFixed(3)} → ${sg2.toFixed(3)} SG.`;
}


function calcPriming() {
  const vol = parseFloat(document.getElementById('prime_volume').value);
  const co2 = parseFloat(document.getElementById('prime_co2').value);

  if (isNaN(vol) || vol <= 0) {
    alert("Enter a valid batch volume in litres.");
    return;
  }

  if (co2 === 0) {
    document.getElementById('primeResult').innerHTML = `
      For <b>${vol.toFixed(1)} L</b> batch:<br>
      • No sugar needed — for still mead.
    `;
    return;
  }


  const sugarPerL = co2 * 4;
  const totalSugarG = vol * sugarPerL;
  const totalSugarKg = totalSugarG / 1000;

  document.getElementById('primeResult').innerHTML = `
    For <b>${vol.toFixed(1)} L</b> batch:<br>
    • Add <b>${totalSugarG.toFixed(0)} g</b> sugar 
      (<b>${totalSugarKg.toFixed(2)} kg</b>)<br>
    • Target carbonation: <b>${co2.toFixed(1)} vols CO₂</b><br>
    (Use table sugar or dextrose. Mix thoroughly before bottling.)
  `;
}


function calcStabilisation({ volumeL, abv, ph, usePH = true, metaType = "kmeta" }) {
  if (!volumeL || volumeL <= 0) return null;

  // ----------------------------
  // Sorbate (MeadTools formula)
  // ----------------------------
  const sorbateG = ((-25 * abv + 400) / 750) * volumeL;

  // ----------------------------
  // SO2 Target
  // ----------------------------
  function getSO2ppmFromPH(ph) {
    const rounded = Math.round(ph * 10) / 10;

    if (rounded <= 2.9) return 11;
    if (rounded === 3.0) return 13;
    if (rounded === 3.1) return 16;
    if (rounded === 3.2) return 21;
    if (rounded === 3.3) return 26;
    if (rounded === 3.4) return 32;
    if (rounded === 3.5) return 39;
    if (rounded === 3.6) return 50;
    if (rounded === 3.7) return 63;
    if (rounded === 3.8) return 98;
    return 123; // fallback for higher pH
  }

  const targetSO2ppm = usePH ? getSO2ppmFromPH(ph || 3.5) : 50;

  // ----------------------------
  // Metabisulfite
  // ----------------------------
  const divisor = metaType === "nameta" ? 674 : 570;
  const metaG = (volumeL * targetSO2ppm) / divisor;

  // ----------------------------
  // Campden tablets equivalent
  // ----------------------------
  const campdenTabs = (targetSO2ppm / 75) * (volumeL / 3.785);

  return {
    sorbateG: +sorbateG.toFixed(2),
    metaG: +metaG.toFixed(2),
    campdenTabs: +campdenTabs.toFixed(2),
    targetSO2ppm
  };
}


function brixToSG(brix) {
  return 1 + (brix / (258.6 - ((brix / 258.2) * 227.1)));
}

function sgToBrix(sg) {
  return (((182.4601 * sg - 775.6821) * sg + 1262.7794) * sg - 669.5622);
}

async function createBin() {
  const { apiKey, securityKey } = getCloudConfig();

  if (!apiKey) {
    console.warn("⚠️ Cannot create bin — missing API key.");
    return null;
  }

  const payload = {
    data: compressPayload(state)
  };

  const res = await fetch("https://json.extendsclass.com/bin", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Api-key": apiKey,
      "Security-key": securityKey,
      "Private": "true"
    },
    body: JSON.stringify(payload)
  });

  const text = await res.text();

  let data;
  try {
    data = JSON.parse(text);
  } catch {
    console.warn("⚠️ Create bin response was not JSON:", text.slice(0, 300));
    return null;
  }

  if (!res.ok) {
    console.warn("⚠️ Could not create ExtendsClass bin:", res.status, data);
    return null;
  }

  const binId = data.id;

  if (!binId) {
    console.warn("⚠️ Bin created but no ID found:", data);
    return null;
  }

  EXTENDS_BIN_ID = binId;
  EXTENDS_API_KEY = apiKey;

  localStorage.setItem("EXTENDS_API_KEY", apiKey);
  localStorage.setItem("EXTENDS_KEY", securityKey);
  localStorage.setItem("EXTENDS_BIN_ID", binId);

  console.log("☁️ Created ExtendsClass bin:", binId);
  return binId;
}

function normaliseCloudData(raw) {
  console.log("☁️ Raw cloud data:", raw);

  let data = raw;

  // ExtendsClass sometimes stores your payload inside .data
  if (data && data.data) {
    data = data.data;
  }

  // Handle compressed payload
  if (data && data.__compressed) {
    data = decompressPayload(data);
  }

  // Handle nested shapes safely
  if (data && data.state) {
    data = data.state;
  }

  if (data && data.data && data.data.batches) {
    data = data.data;
  }

  if (data && data.batches && Array.isArray(data.batches)) {
    return {
      ...state,
      ...data,
      batches: data.batches,
      cloudEnabled: true
    };
  }

  console.warn("☁️ Cloud data did not contain a valid batches array:", raw);

  return {
    ...state,
    cloudEnabled: true
  };
}

async function cloudLoad() {
  try {
    const apiKey = localStorage.getItem("EXTENDS_API_KEY");
    const securityKey = localStorage.getItem("EXTENDS_KEY") || EXTENDS_KEY;
    const binId = localStorage.getItem("EXTENDS_BIN_ID");

    if (!apiKey || !securityKey || !binId) {
      throw new Error("Missing API key, Security key, or bin ID");
    }

    localStorage.setItem("EXTENDS_KEY", securityKey);

    const res = await fetch(`${EXTENDS_API}/${binId}`, {
      method: "GET",
      headers: {
        "Accept": "application/json",
        "Security-key": securityKey
      }
    });

    const text = await res.text();

    if (!res.ok) {
      throw new Error(`Cloud load failed: HTTP ${res.status}\n${text.slice(0, 300)}`);
    }

    let raw = JSON.parse(text);
    console.log("☁️ Raw cloud data:", raw);

    let data = raw;

    if (data && data.data) data = data.data;
    if (data && data.__compressed) data = decompressPayload(data);
    if (data && data.state) data = data.state;
    if (data && data.data && data.data.batches) data = data.data;

    if (!data || !Array.isArray(data.batches)) {
      console.warn("☁️ Cloud data has no valid batches array:", raw);

      return {
        ...state,
        cloudEnabled: true
      };
    }

    const loadedState = {
      ...state,
      ...data,
      batches: data.batches,
      cloudEnabled: true
    };

    console.log("☁️ Normalised cloud data:", loadedState);
    console.log("☁️ Final cloud batches:", loadedState.batches);

    state = loadedState;
    selectedId = state.batches[0]?.id || null;

    save(state);

    if (typeof render === "function") {
      render();
    } else {
      if (typeof renderApp === "function") renderApp();
      if (typeof renderBatchList === "function") renderBatchList();
      if (typeof renderDetail === "function") renderDetail();
      if (typeof renderFooterButtons === "function") renderFooterButtons();
      if (typeof updateSyncCard === "function") updateSyncCard();
      if (typeof updateViewBinButton === "function") updateViewBinButton();
    }

    return state;

  } catch (err) {
    console.error("☁️ Cloud load failed:", err);

    alert(
      "Cloud load failed:\n\n" +
      (err && err.message ? err.message : String(err))
    );

    return null;
  }
}


async function cloudSave(payload = state) {

  if (!hasMeaningfulLocalData(state)) {
    console.warn("☁️ Skipped cloud save: no local batch data.");
    return false;
  }
  
  try {
    if (!navigator.onLine) {
      console.log("📦 Offline — queuing save for later sync.");
      const queue = JSON.parse(localStorage.getItem("offlineQueue") || "[]");
      queue.push(payload);
      localStorage.setItem("offlineQueue", JSON.stringify(queue));
      save(state);
      return;
    }

    let { apiKey, securityKey, binId } = getCloudConfig();

if (!apiKey) {
  console.warn("⚠️ No API key — skipping cloud save.");
  save(state);
  return;
}

    if (!binId) {
      binId = await getExistingBin();
    }

    if (!binId) {
      binId = await createBin();
    }

    if (!binId) {
      throw new Error("Missing bin ID");
    }

    EXTENDS_BIN_ID = binId;
    localStorage.setItem("EXTENDS_BIN_ID", binId);
    localStorage.setItem("EXTENDS_KEY", securityKey);

    const dataToSave = payload?.batches ? payload : state;

    const bodyData = compressPayload(dataToSave);

    const res = await fetch(`${EXTENDS_API}/${binId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "Security-key": securityKey
      },
      body: JSON.stringify({
        data: bodyData
      })
    });

    const text = await res.text();

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}\n${text.slice(0, 300)}`);
    }

    console.log("☁️ PUT sync successful");
    updateViewBinButton();
    updateSyncCard();

  } catch (err) {
    console.warn("⚠️ ExtendsClass sync failed:", err);
    updateViewBinButton();
  }
}

// 🔹 When connection is restored, flush queued saves
window.addEventListener("online", async () => {
  const queued = JSON.parse(localStorage.getItem("offlineQueue") || "[]");
  if (!queued.length) return;
  console.log(`🌐 Back online — syncing ${queued.length} queued updates...`);
  for (const p of queued) {
    try {
      await cloudSave(p, true);
      console.log("☁️ Synced queued payload");
    } catch (err) {
      console.warn("⚠️ Failed to sync queued payload:", err);
    }
  }
  localStorage.removeItem("offlineQueue");
});

window.addEventListener("beforeunload", () => cloudSave(state));


const saveApiKeyBtn = document.getElementById("saveApiKeyBtn");
if (saveApiKeyBtn) {
  saveApiKeyBtn.addEventListener("click", async () => {
    const keyInput = document.getElementById("apiKeyInput");
    const newKey = keyInput.value.trim();

    // 🧹 If blank — disable cloud mode completely
    if (!newKey) {
      clearExtendsCredentials();
      EXTENDS_API_KEY = "";
      EXTENDS_BIN_ID = "";
      state.cloudEnabled = false;
      updateSyncCard();
      updateViewBinButton();
      console.log("💾 Cloud sync disabled — reverted to local-only mode.");
      alert("💾 Cloud sync disabled — now saving locally only.");
      return;
    }

    // ✅ Save new key and enable cloud mode
    EXTENDS_API_KEY = newKey;
    localStorage.setItem("EXTENDS_API_KEY", EXTENDS_API_KEY);
    localStorage.setItem("EXTENDS_KEY", EXTENDS_KEY);
    state.cloudEnabled = true;

    console.log("🔑 ExtendsClass API key saved:", EXTENDS_API_KEY);

    // 🪣 Create or reuse bin
    if (!EXTENDS_BIN_ID) {
      const existingBin = await getExistingBin();
      if (existingBin) {
        EXTENDS_BIN_ID = existingBin;
        localStorage.setItem("EXTENDS_BIN_ID", EXTENDS_BIN_ID);
        console.log(`☁️ Using existing bin: ${EXTENDS_BIN_ID}`);
} else {
  try {
    const newBinId = await createBin();

    if (!newBinId) {
      throw new Error("No bin ID was created.");
    }
  } catch (err) {
    console.error("Failed to create bin:", err);
    alert("⚠️ Could not create JSON bin.\n" + err.message);
    return;
  }
}
    }

    updateViewBinButton();
    updateSyncCard();

    // ☁️ Attempt to load cloud data, or upload local if empty
    try {
      const cloudData = await cloudLoad();
      const dataToUse =
        cloudData && (cloudData.batches?.length || cloudData.data?.batches?.length)
          ? (cloudData.data?.batches ? cloudData.data : cloudData)
          : null;

      if (dataToUse) {
        console.log("☁️ Loaded cloud data after key entry:", dataToUse);
        state = dataToUse;
        save(state);
        render();
        alert("✅ API key saved — cloud data loaded successfully.");
      } else {
        console.log("☁️ No cloud data found — uploading local state.");
        await cloudSave(state);
        alert("✅ API key saved — local data uploaded to cloud.");
      }
    } catch (err) {
      console.warn("⚠️ Failed to load cloud data after key entry:", err);
      alert("⚠️ API key saved, but failed to fetch cloud data. Using local data for now.");
    }
  });
}

async function getExistingBin() {
  const { apiKey } = getCloudConfig();

  if (!apiKey) return null;

  try {
    const res = await fetch("https://json.extendsclass.com/bins", {
      method: "GET",
      headers: {
        "Accept": "application/json",
        "Api-key": apiKey
      }
    });

    const text = await res.text();

    console.log("☁️ /bins status:", res.status);
    console.log("☁️ /bins raw response:", text);

    if (!res.ok) return null;

    const bins = JSON.parse(text);

    console.log("☁️ Found existing bins:", bins);

    if (!Array.isArray(bins) || bins.length === 0) return null;

    const first = bins[0];

    if (typeof first === "string") return first;
    if (first.id) return first.id;
    if (first._id) return first._id;
    if (first.binId) return first.binId;

    return null;
  } catch (err) {
    console.warn("⚠️ Could not list ExtendsClass bins:", err);
    return null;
  }
}
